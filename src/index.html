<!DOCTYPE html>

  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>

  <body>
    <form data-qa="big" class="search search--big">
      <input
        name="location"
        class="search__input"

    <form data-qa="small" class="search search--small">

        placeholder="Try &ldquo;Los Angeles&rdquo;"
      />
    </form>
  </body>
